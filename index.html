<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedice Obytňák 2026</title>
    <!-- Tailwind CSS pro moderní vzhled -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome pro ikonky -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-800 antialiased">

    <!-- Zabezpečovací obrazovka (PIN) -->
    <div id="pinScreen" class="fixed inset-0 bg-slate-800 z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-8 rounded-xl shadow-2xl text-center max-w-sm w-full mx-4">
            <i class="fa-solid fa-camper-van text-5xl text-blue-600 mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">Expedice 2026</h2>
            <p class="text-slate-500 mb-6">Zadejte přístupový PIN pro vstup do sdíleného plánovače.</p>
            <input type="password" id="pinInput" class="w-full text-center text-2xl p-3 border-2 border-slate-200 rounded-lg mb-4 focus:outline-none focus:border-blue-500" placeholder="••••">
            <button onclick="checkPin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                Vstoupit
            </button>
            <p id="pinError" class="text-red-500 mt-4 hidden">Nesprávný PIN!</p>
        </div>
    </div>

    <!-- Hlavní aplikace (skrytá dokud není zadán PIN) -->
    <div id="mainApp" class="hidden max-w-6xl mx-auto p-4 md:p-6 pb-20">
        
        <!-- Hlavička -->
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800"><i class="fa-solid fa-route text-blue-600 mr-2"></i> Evropa Obytňákem</h1>
                <p class="text-slate-500 mt-1">Německo <i class="fa-solid fa-arrow-right mx-1 text-xs"></i> Rakousko <i class="fa-solid fa-arrow-right mx-1 text-xs"></i> Itálie</p>
            </div>
            <div class="mt-4 md:mt-0 bg-blue-50 px-4 py-2 rounded-lg text-blue-800 font-medium">
                <i class="fa-regular fa-calendar mr-2"></i> 31. 5. – 7. 6. 2026
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Levý sloupec: Úkoly a věci -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- Společný Checklist -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fa-solid fa-list-check text-green-500 mr-2"></i> Co zařídit & s sebou</h2>
                    
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="taskInput" class="flex-1 p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-green-500" placeholder="Přidat úkol...">
                        <button onclick="addTask()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition-colors"><i class="fa-solid fa-plus"></i></button>
                    </div>

                    <ul id="taskList" class="space-y-2 max-h-96 overflow-y-auto pr-2">
                        <!-- Zde se vykreslí úkoly z Firebase -->
                    </ul>
                </div>
            </div>

            <!-- Pravý sloupec: Rozpočet a Poznámky -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Sdílený Rozpočet -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fa-solid fa-wallet text-blue-500 mr-2"></i> Sdílené výdaje</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-slate-50 p-4 rounded-lg">
                        <div class="col-span-1 md:col-span-1">
                            <select id="payerInput" class="w-full p-2 border border-slate-200 rounded-lg bg-white">
                                <option value="Michal">Michal</option>
                                <option value="Marek">Marek</option>
                                <option value="Táta">Táta</option>
                            </select>
                        </div>
                        <div class="col-span-1 md:col-span-2">
                            <input type="text" id="expenseDescInput" class="w-full p-2 border border-slate-200 rounded-lg" placeholder="Za co to bylo (nafta, kemp...)">
                        </div>
                        <div class="col-span-1 md:col-span-1 flex gap-2">
                            <input type="number" id="amountInput" class="w-full p-2 border border-slate-200 rounded-lg" placeholder="Kč">
                            <button onclick="addExpense()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>

                    <!-- Statistiky -->
                    <div class="grid grid-cols-3 gap-4 mb-6 border-b border-slate-100 pb-6 text-center">
                        <div><p class="text-sm text-slate-500">Michal zaplatil</p><p id="sumMichal" class="text-xl font-bold text-slate-800">0 Kč</p></div>
                        <div><p class="text-sm text-slate-500">Marek zaplatil</p><p id="sumMarek" class="text-xl font-bold text-slate-800">0 Kč</p></div>
                        <div><p class="text-sm text-slate-500">Táta zaplatil</p><p id="sumTata" class="text-xl font-bold text-slate-800">0 Kč</p></div>
                    </div>

                    <ul id="expenseList" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                        <!-- Výdaje z Firebase -->
                    </ul>
                </div>

                <!-- Poznámky -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fa-regular fa-comment-dots text-yellow-500 mr-2"></i> Domluva a Nápady</h2>
                    
                    <div class="flex gap-2 mb-4">
                        <select id="noteAuthorInput" class="w-24 p-2 border border-slate-200 rounded-lg bg-slate-50">
                            <option value="Michal">Michal</option>
                            <option value="Marek">Marek</option>
                            <option value="Táta">Táta</option>
                        </select>
                        <input type="text" id="noteInput" class="flex-1 p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-yellow-500" placeholder="Napiš zprávu nebo nápad...">
                        <button onclick="addNote()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg transition-colors"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>

                    <div id="noteList" class="space-y-3 max-h-60 overflow-y-auto pr-2 flex flex-col-reverse">
                        <!-- Poznámky z Firebase -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modulární verze 10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        // TVŮJ KONFIGURAČNÍ KLÍČ (přesně ten, co jsi zkopíroval)
        const firebaseConfig = {
            apiKey: "AIzaSyDe1EZfaMyYRVUgKugZzVixzGReEXBUsb8",
            authDomain: "obytnak-2026.firebaseapp.com",
            projectId: "obytnak-2026",
            storageBucket: "obytnak-2026.firebasestorage.app",
            messagingSenderId: "56459323943",
            appId: "1:56459323943:web:2b8c065bcf6cfc61d37c02"
        };

        // Inicializace Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Odkazy na kolekce v databázi
        const checklistCol = collection(db, 'checklist');
        const expensesCol = collection(db, 'expenses');
        const notesCol = collection(db, 'notes');

        // Funkce pro PIN (dostupná globálně)
        window.checkPin = function() {
            const pin = document.getElementById('pinInput').value;
            if (pin === '2026') {
                document.getElementById('pinScreen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('pinScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                }, 500);
            } else {
                document.getElementById('pinError').classList.remove('hidden');
            }
        };

        // Naslouchání klávese Enter pro PIN
        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.checkPin();
        });

        // --- 1. CHECKLIST LOGIKA ---
        onSnapshot(query(checklistCol, orderBy('createdAt', 'asc')), (snapshot) => {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            snapshot.forEach(d => {
                const item = d.data();
                const id = d.id;
                
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-100 hover:bg-slate-100 transition-colors";
                
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleTask('${id}', this.checked)" class="w-5 h-5 text-green-600 rounded cursor-pointer">
                        <span class="${item.done ? 'line-through text-slate-400' : 'text-slate-700'} cursor-pointer" onclick="toggleTask('${id}', ${!item.done})">${item.text}</span>
                    </div>
                    <button onclick="deleteTask('${id}')" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash"></i></button>
                `;
                list.appendChild(li);
            });
        });

        window.addTask = async function() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === '') return;
            await addDoc(checklistCol, {
                text: input.value.trim(),
                done: false,
                createdAt: serverTimestamp()
            });
            input.value = '';
        };

        window.toggleTask = async function(id, isDone) {
            await updateDoc(doc(db, 'checklist', id), { done: isDone });
        };

        window.deleteTask = async function(id) {
            await deleteDoc(doc(db, 'checklist', id));
        };


        // --- 2. ROZPOČET LOGIKA ---
        onSnapshot(query(expensesCol, orderBy('createdAt', 'desc')), (snapshot) => {
            const list = document.getElementById('expenseList');
            list.innerHTML = '';
            
            let sums = { 'Michal': 0, 'Marek': 0, 'Táta': 0 };

            snapshot.forEach(d => {
                const item = d.data();
                const id = d.id;
                
                // Přičtení do statistik
                if(sums[item.payer] !== undefined) {
                    sums[item.payer] += Number(item.amount);
                }

                // Vykreslení řádku
                const li = document.createElement('li');
                li.className = "flex justify-between items-center p-3 border-b border-slate-100 last:border-0";
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-medium text-slate-800">${item.description}</span>
                        <span class="text-xs text-slate-500">Platil: ${item.payer}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-700">${item.amount} Kč</span>
                        <button onclick="deleteExpense('${id}')" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-times"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });

            // Aktualizace nadpisů
            document.getElementById('sumMichal').innerText = sums['Michal'] + ' Kč';
            document.getElementById('sumMarek').innerText = sums['Marek'] + ' Kč';
            document.getElementById('sumTata').innerText = sums['Táta'] + ' Kč';
        });

        window.addExpense = async function() {
            const payer = document.getElementById('payerInput').value;
            const desc = document.getElementById('expenseDescInput').value;
            const amount = document.getElementById('amountInput').value;
            
            if (desc.trim() === '' || amount.trim() === '') return;

            await addDoc(expensesCol, {
                payer: payer,
                description: desc.trim(),
                amount: Number(amount),
                createdAt: serverTimestamp()
            });
            
            document.getElementById('expenseDescInput').value = '';
            document.getElementById('amountInput').value = '';
        };

        window.deleteExpense = async function(id) {
            await deleteDoc(doc(db, 'expenses', id));
        };


        // --- 3. POZNÁMKY LOGIKA ---
        onSnapshot(query(notesCol, orderBy('createdAt', 'desc')), (snapshot) => {
            const list = document.getElementById('noteList');
            list.innerHTML = '';
            snapshot.forEach(d => {
                const item = d.data();
                const div = document.createElement('div');
                div.className = "p-3 bg-slate-50 rounded-lg border border-slate-100";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-bold ${item.author === 'Michal' ? 'text-blue-600' : (item.author === 'Marek' ? 'text-green-600' : 'text-yellow-600')}">${item.author}</span>
                    </div>
                    <p class="text-sm text-slate-700">${item.text}</p>
                `;
                list.appendChild(div);
            });
        });

        window.addNote = async function() {
            const author = document.getElementById('noteAuthorInput').value;
            const text = document.getElementById('noteInput').value;
            
            if (text.trim() === '') return;

            await addDoc(notesCol, {
                author: author,
                text: text.trim(),
                createdAt: serverTimestamp()
            });
            
            document.getElementById('noteInput').value = '';
        };

        // Podpora Enter pro zadávání polí
        document.getElementById('taskInput').addEventListener('keypress', e => { if(e.key === 'Enter') window.addTask(); });
        document.getElementById('amountInput').addEventListener('keypress', e => { if(e.key === 'Enter') window.addExpense(); });
        document.getElementById('noteInput').addEventListener('keypress', e => { if(e.key === 'Enter') window.addNote(); });

    </script>
</body>
</html>
